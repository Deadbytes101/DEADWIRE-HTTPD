name: V2 Full Verify Gate

on:
  push:
    branches:
      - main
      - 'feat/**'
  pull_request:
    branches:
      - main

jobs:
  verify-v2:
    name: verify-v2
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify V2 boundary and server behavior
        shell: powershell
        run: powershell.exe -NoProfile -ExecutionPolicy Bypass -File scripts/verify-v2.ps1
